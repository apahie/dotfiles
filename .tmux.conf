# ベル通知（Claude Codeの待機検知）
set -g monitor-bell on

# ウィンドウ名をリポジトリ名(ブランチ名)で自動表示
set -g automatic-rename-format '#(~/.tmux/window-name.sh #{pane_current_path})'

# プレフィックス入力時にIMEを半角に切り替え
set -g prefix C-F12
bind -n C-Space {
    run-shell -b 'zenhan.exe 0 >/dev/null 2>&1; true'
    switch-client -T prefix
}

# 新しいペインを現在のディレクトリで開く
bind '"' split-window -v -c '#{pane_current_path}'
bind '%' split-window -h -c '#{pane_current_path}'

# copy mode（vim風キーバインド + クリップボード連携）
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel '/mnt/c/WINDOWS/system32/clip.exe'

# 基本設定
set -g mode-keys vi
set -g mouse on
set -g base-index 1
