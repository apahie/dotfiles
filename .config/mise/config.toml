[tools]
go = "latest"
node = "lts"
rust = "stable"
uv = "latest"

starship = "latest"
delta = "latest"
bun = "latest"
kubectl = "latest"
helm = "latest"
fzf = "latest"
fd = "latest"
ripgrep = "latest"
jq = "latest"
yq = "latest"
neovim = "latest"
tmux = "latest"
"npm:@playwright/cli" = "latest"
"npm:@devcontainers/cli" = "latest"
"pipx:apm-cli" = "latest"

[tasks.update]
description = "ツールのアップデート"
run = """
echo "==> apt update & upgrade"
sudo apt update && sudo apt upgrade -y
echo "==> mise self-update"
mise self-update -y
echo "==> mise upgrade"
mise upgrade
echo "==> スキルのインストール・アップデート (APM)"
apm install -g
apm deps update -g
"""
