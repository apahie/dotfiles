[tools]
go = "latest"
node = "lts"
rust = "stable"
uv = "latest"

starship = "latest"
delta = "latest"
bun = "latest"
kubectl = "latest"
helm = "latest"
fzf = "latest"
jq = "latest"
yq = "latest"
neovim = "latest"
tmux = "latest"
"npm:@playwright/cli" = "latest"
"npm:@devcontainers/cli" = "latest"

[tasks.update]
description = "ツールのアップデート"
run = """
echo "==> apt update & upgrade"
sudo apt update && sudo apt upgrade -y
echo "==> mise self-update"
mise self-update -y
echo "==> mise upgrade"
mise upgrade
echo "==> スキルのアップデート"
mise run update-skills
"""

[tasks.update-skills]
description = "Claude Codeスキルのインストール・アップデート"
run = """
INSTALLED=$(npx --yes skills list -g --json | jq -r '.[].name')

# 未インストールのリポジトリをインストール
echo "$INSTALLED" | grep -q "^playwright-cli$" || npx --yes skills add https://github.com/microsoft/playwright-cli --agent claude-code --skill '*' -y -g

# インストール済みスキルを更新
npx --yes skills update -g -y
"""
